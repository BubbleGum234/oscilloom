name: Build Installers

# Triggers on release tags OR manual dispatch (for testing)
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            pyinstaller_os: macos
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            pyinstaller_os: linux
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            pyinstaller_os: windows

    runs-on: ${{ matrix.platform }}

    steps:
      # ── Checkout ──
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python backend build ──
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build backend with PyInstaller
        run: pyinstaller oscilloom.spec

      - name: Rename sidecar for Tauri
        shell: bash
        run: |
          # Tauri expects the sidecar named with the target triple
          if [ "${{ matrix.pyinstaller_os }}" = "windows" ]; then
            cp dist/oscilloom-server.exe "src-tauri/oscilloom-server-${{ matrix.target }}.exe"
          else
            cp dist/oscilloom-server "src-tauri/oscilloom-server-${{ matrix.target }}"
            chmod +x "src-tauri/oscilloom-server-${{ matrix.target }}"
          fi

      # ── Node.js frontend build ──
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      # ── System deps (Linux only) ──
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # ── Rust + Tauri build ──
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0"

      - name: Build Tauri app
        run: cargo tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # ── Upload artifacts ──
      - name: Upload macOS .dmg
        if: startsWith(matrix.platform, 'macos')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload Linux .AppImage & .deb
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb

      - name: Upload Windows .msi & .exe
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

      # ── Updater JSON (for auto-updates) ──
      - name: Upload updater JSON
        if: startsWith(matrix.platform, 'macos') || matrix.platform == 'ubuntu-22.04' || matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/*/latest.json
